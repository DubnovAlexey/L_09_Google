<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Search - Classic</title>
	<!-- External stylesheet link for classic design -->
  <link rel="stylesheet" href="css/classicStyle.css">
</head>
<body>

  <!-- Main search form executing GET request -->
  <form class="search-form" action="https://www.google.com/search" method="get">
    
    <!-- Label and text input container -->
    <label class="search-label">
      Search:
      <input class="search-input" type="text" name="q" placeholder="Type your query..." required>
    </label>
    
    <!-- Action row containing submit and back buttons -->
    <div class="actions-group">
      <button class="search-btn" type="submit" aria-label="Submit Search">Search</button>
      <a href="index.html" class="back-btn" aria-label="Back to hub">Back</a>
    </div>

  </form>

</body>
</html>
